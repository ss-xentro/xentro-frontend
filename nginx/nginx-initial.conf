# Temporary HTTP-only config used during initial certificate creation.
# Once certificates exist, the full nginx.conf (with SSL) takes over.

server {
    listen 80;
    server_name ${DOMAIN};

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Serve a simple response so we know Nginx is alive
    location / {
        return 200 'Waiting for SSL certificate...\n';
        add_header Content-Type text/plain;
    }
}
