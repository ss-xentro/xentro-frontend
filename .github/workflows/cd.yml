name: Deploy Frontend to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

env:
  DEPLOY_DIR: /opt/xentro/frontend

jobs:
  deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail

            DEPLOY_DIR="/opt/xentro/frontend"

            echo "══════════════════════════════════════════════"
            echo "  Deploying Xentro Frontend — $(date)"
            echo "══════════════════════════════════════════════"

            cd "$DEPLOY_DIR"

            # ── Pull latest code ──────────────────────────
            echo "→ Pulling latest code from main..."
            git fetch origin main
            git reset --hard origin/main

            # ── Copy env file ─────────────────────────────
            cp ../.env .

            # ── Stop & remove existing containers ─────────
            echo "→ Stopping existing containers..."
            docker compose down -v

            # ── Build & start frontend ────────────────────
            echo "→ Building frontend..."
            docker compose build nextjs-frontend

            echo "→ Starting frontend..."
            docker compose up -d nextjs-frontend

            # ── Cleanup ───────────────────────────────────
            echo "→ Pruning unused Docker resources..."
            docker system prune -af

            # ── Health check ──────────────────────────────
            echo "→ Waiting for frontend to start..."
            sleep 10

            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "✓ Frontend is healthy"
            else
              echo "✗ Frontend health check failed!"
              docker compose logs --tail=50 nextjs-frontend
              exit 1
            fi

            echo ""
            echo "══════════════════════════════════════════════"
            echo "  Frontend deploy complete — $(date)"
            echo "══════════════════════════════════════════════"

