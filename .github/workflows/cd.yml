name: Deploy Frontend to EC2

on:
  push:
    branches: [main]

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail

            DEPLOY_DIR="/home/admin/xentro-frontend"

            echo "══════════════════════════════════════════════"
            echo "  Deploying Xentro Frontend — $(date)"
            echo "══════════════════════════════════════════════"

            cd "$DEPLOY_DIR"

            # ── Ensure clean git state ─────────────────────
            echo "→ Syncing with origin/main..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # ── Copy environment file ──────────────────────
            echo "→ Applying environment configuration..."
            cp ../.env .

            # ── Light Docker cleanup (keep layer cache) ───
            echo "→ Cleaning dangling Docker images..."
            docker image prune -f || true

            # ── Rebuild & restart services ─────────────────
            echo "→ Rebuilding and starting containers..."
            docker compose up -d --build --remove-orphans

            # ── Health check with enforcement ──────────────
            echo "→ Performing health check..."

            HEALTHY=false

            for i in {1..30}; do
              if curl -sf http://localhost > /dev/null; then
                echo "✓ Frontend is healthy"
                HEALTHY=true
                break
              fi
              sleep 2
            done

            if [ "$HEALTHY" = false ]; then
              echo "✗ Frontend failed health check"
              docker compose ps
              docker compose logs --tail=50 nextjs-app
              exit 1
            fi

            echo ""
            echo "══════════════════════════════════════════════"
            echo "  Frontend deploy complete — $(date)"
            echo "══════════════════════════════════════════════"
